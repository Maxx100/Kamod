<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css?v=20260322-1">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="header">
    <a href="/main" class="logo"><span>🎓</span> СТУД<span class="logo-events">EVENTS</span></a>
    <ul class="nav-links">
      <li><a href="/my-events" id="myEventsNavLink" class="{{ 'active' if active_page == 'my-events' else '' }} hidden">Мои мероприятия</a></li>
      <li><a href="/tickets" class="{{ 'active' if active_page == 'tickets' else '' }}">Билеты</a></li>
      <li><a href="/profile" id="profileNavLink" class="{{ 'active' if active_page == 'profile' else '' }} hidden">Профиль</a></li>
    </ul>
    <div class="auth-buttons" id="authButtons">
      <a href="/login" class="btn btn-outline">Войти</a>
      <a href="/register" class="btn btn-primary">Регистрация</a>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="/js/auth.js?v=20260322-1"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
