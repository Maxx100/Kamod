<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Создать мероприятие — СТУДEVENTS</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    @font-face {
      font-family: 'GolosText';
      font-weight: 1 999;
      src: url('https://cdn.itmo.pro/fonts/Golos-Text_VF.ttf') format('truetype');
    }
    @font-face {
      font-family: 'ALS Gorizont Variable';
      font-weight: 1 999;
      src: url('https://cdn.itmo.pro/fonts/ALS%20Gorizont%20Variable.ttf') format('truetype');
    }

    :root {
      --white-color: #fff;
      --black-color: #000;
      --link-color: #254ddd;
      --primary-color: #0b68fe;
      --red-color: #d2342d;
      --green-color: #03ad3f;
      --grey-color: #8e92a2;
      --light-grey-color: #f5f6fa;
      --black-300: #a3a6af;
      --black-600: #37394b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      font-size: 16px;
      font-family: 'GolosText', sans-serif;
      background: var(--white-color);
      color: var(--black-color);
      min-height: 100vh;
    }
    h1, h2, h3, h4 {
      font-family: 'ALS Gorizont Variable', sans-serif;
      font-weight: 700;
    }
    h2 { font-size: 28px; line-height: 52px; font-weight: 750; }
    p { font-size: 16px; line-height: 24px; }
    a { color: var(--link-color); text-decoration: none; }

    .header {
      display: flex;
      width: 100%;
      max-width: 1192px;
      height: 72px;
      align-items: center;
      justify-content: space-between;
      margin: 0 auto;
      padding: 0 16px;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--black-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .container {
      max-width: 1208px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    .form-wrapper {
      padding: 40px 16px;
    }

    .form-card {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      background: var(--white-color);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-title {
      text-align: center;
      margin-bottom: 32px;
      color: var(--black-color);
    }

    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--black-600);
      font-size: 14px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--black-300);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'GolosText', sans-serif;
      transition: border-color 0.2s;
      background: var(--white-color);
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(11,104,254,0.1);
    }
    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary-color);
    }

    .price-field {
      margin-top: 16px;
      padding-left: 26px;
    }
    .price-field.hidden { display: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'GolosText', sans-serif;
      width: 100%;
    }
    .btn-primary {
      background: var(--black-color);
      color: var(--white-color);
    }
    .btn-primary:hover {
      background: var(--primary-color);
    }
    .btn-success {
      background: var(--green-color);
      color: var(--white-color);
    }

    .error-message,
    .success-message {
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }
    .error-message { color: var(--red-color); }
    .success-message { color: var(--green-color); }

    @media (max-width: 576px) {
      .form-card { padding: 24px; }
      h2 { font-size: 24px; line-height: 40px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">
      <span>🎓</span> СТУДEVENTS
    </a>
  </header>

  <main class="container">
    <div class="form-wrapper">
      <div class="form-card">
        <h2 class="form-title">Создать мероприятие</h2>
        <form id="createEventForm">
          <div class="form-group">
            <label for="title">Название мероприятия *</label>
            <input type="text" id="title" name="title" required placeholder="Например: Хакатон ITMO 2024">
          </div>
          
          <div class="form-group">
            <label for="category">Категория *</label>
            <select id="category" name="category" required>
              <option value="">Выберите категорию</option>
              <option value="hackathon">Хакатон</option>
              <option value="conference">Конференция</option>
              <option value="workshop">Мастер-класс</option>
              <option value="meetup">Митап</option>
              <option value="competition">Конкурс</option>
              <option value="other">Другое</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="eventDate">Дата и время проведения *</label>
            <input type="datetime-local" id="eventDate" name="eventDate" required>
          </div>
          
          <div class="form-group">
            <label for="address">Адрес проведения *</label>
            <input type="text" id="address" name="address" required placeholder="г. Санкт-Петербург, ул. Ломоносова, 9">
          </div>
          
          <div class="form-group">
            <label for="description">Описание мероприятия *</label>
            <textarea id="description" name="description" required placeholder="Расскажите подробнее о мероприятии..."></textarea>
          </div>
          
          <div class="form-group">
            <label for="coverUrl">URL обложки мероприятия</label>
            <input type="url" id="coverUrl" name="coverUrl" placeholder="https://example.com/image.jpg">
          </div>
          
          <div class="form-group">
            <label class="checkbox-group">
              <input type="checkbox" id="isPaid" name="isPaid">
              <span>Мероприятие платное</span>
            </label>
          </div>
          
          <div class="form-group price-field hidden" id="priceGroup">
            <label for="price">Стоимость билета (₽)</label>
            <input type="number" id="price" name="price" min="0" step="100" placeholder="500">
          </div>
          
          <div class="error-message" id="formError"></div>
          <div class="success-message" id="formSuccess"></div>
          
          <button type="submit" class="btn btn-success">Опубликовать мероприятие</button>
        </form>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      
      document.getElementById('isPaid').addEventListener('change', (e) => {
        document.getElementById('priceGroup').classList.toggle('hidden', !e.target.checked);
        if (!e.target.checked) {
          document.getElementById('price').value = '';
        }
      });
    });
    
    document.getElementById('createEventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        title: document.getElementById('title').value,
        category: document.getElementById('category').value,
        eventDate: document.getElementById('eventDate').value,
        address: document.getElementById('address').value,
        description: document.getElementById('description').value,
        coverUrl: document.getElementById('coverUrl').value || null,
        isPaid: document.getElementById('isPaid').checked,
        price: document.getElementById('isPaid').checked ? document.getElementById('price').value : null
      };
      
      try {
        const token = localStorage.getItem('token');
        const response = await fetch('/api/events', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(formData)
        });
        
        if (response.ok) {
          const data = await response.json();
          document.getElementById('formSuccess').textContent = '✅ Мероприятие создано!';
          document.getElementById('formSuccess').style.display = 'block';
          setTimeout(() => window.location.href = `event.html?id=${data.id}`, 1500);
        } else {
          const error = await response.json();
          document.getElementById('formError').textContent = error.message || 'Ошибка создания';
          document.getElementById('formError').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('formError').textContent = 'Ошибка соединения';
        document.getElementById('formError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
