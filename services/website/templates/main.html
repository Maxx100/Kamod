{% extends 'base.html' %}

{% block content %}
<section id="heroEvent">
  <div class="carousel-item">
    <img src="/img/1.jpeg" alt="Событие" class="carousel-bg">
    <div class="carousel-content">
      <h1 class="carousel-title">Загрузка событий...</h1>
    </div>
  </div>
</section>

<h2 class="page-title" style="margin-top:24px;">Популярные сейчас</h2>
<div class="events-grid" id="popularEventsGrid">
  <div class="card">Загрузка популярных событий...</div>
</div>

<h2 class="page-title">Все мероприятия</h2>
<div class="filters-card">
  <div class="filters filters-grid">
    <div class="filter-field">
      <label for="titleFilter">Название мероприятия</label>
      <input id="titleFilter" type="text" placeholder="Например: Python meetup">
    </div>
    <div class="filter-field">
      <label for="dateFromFilter">С даты</label>
      <input id="dateFromFilter" type="date">
    </div>
    <div class="filter-field">
      <label for="dateToFilter">По дату</label>
      <input id="dateToFilter" type="date">
    </div>
    <div class="filter-actions">
      <button class="btn btn-outline" type="button" onclick="resetFilters()">Сбросить</button>
    </div>
  </div>
  <div class="filter-tags-block">
    <div class="filter-tags-title">Теги</div>
    <div class="filter-tags" id="tagFilters">
      <button type="button" class="filter-chip" data-tag="hackathon">Хакатон</button>
      <button type="button" class="filter-chip" data-tag="conference">Конференция</button>
      <button type="button" class="filter-chip" data-tag="workshop">Мастер-класс</button>
      <button type="button" class="filter-chip" data-tag="meetup">Митап</button>
      <button type="button" class="filter-chip" data-tag="competition">Конкурс</button>
      <button type="button" class="filter-chip" data-tag="online">Онлайн</button>
      <button type="button" class="filter-chip" data-tag="other">Другое</button>
    </div>
  </div>
</div>

<div class="events-grid" id="eventsGrid"></div>
<div style="margin: 20px 0 32px; text-align: center;">
  <button class="btn btn-primary" id="loadMoreBtn">Показать ещё</button>
</div>
{% endblock %}

{% block scripts %}
<script src="/js/events.js?v=20260322-3"></script>
{% endblock %}
