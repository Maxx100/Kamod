services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: kamod
      POSTGRES_USER: kamod
      POSTGRES_PASSWORD: kamod
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - meganetwork

  website:
    build:
      context: .
      dockerfile: ./services/website/Dockerfile
    container_name: website
    ports:
      - "80:80"
      - "5001:5000"
    env_file:
      - ./services/website/.env
    volumes:
      - ./services/website/logs:/app/logs
    restart: unless-stopped
    networks:
      - meganetwork

  database:
    build:
      context: .
      dockerfile: ./services/database/Dockerfile
    container_name: database
    depends_on:
      - postgres
    ports:
      - "8000:8000"
      - "5002:8000"
    env_file:
      - ./services/database/.env
    volumes:
      - ./services/database/logs:/app/logs
      - ./data:/data
    restart: unless-stopped
    networks:
      - meganetwork
  
  tgbot:
    build:
      context: .
      dockerfile: ./services/tgbot/Dockerfile
    container_name: tgbot
    ports:
      - "127.0.0.1:8890:8890"
      - "5003:5000"
    env_file:
      - ./services/tgbot/.env
    volumes:
      - ./services/tgbot/logs:/app/logs
    restart: unless-stopped
    networks:
      - meganetwork

networks:
  meganetwork:
    driver: bridge
