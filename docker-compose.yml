version: '3.8'

services:
  website:
    build:
      context: .
      dockerfile: ./services/website/Dockerfile
    container_name: website
    ports:
      - "80:80"
    env_file:
      - ./services/website/.env
    volumes:
      - ./services/website/logs:/app/logs
    restart: unless-stopped
    networks:
      - meganetwork

  database:
    build:
      context: .
      dockerfile: ./services/database/Dockerfile
    container_name: database
    ports:
      - "6677:6677"
    env_file:
      - ./services/database/.env
    volumes:
      - ./services/database/logs:/app/logs
      - ./sites:/app/sites
      - ./data:/data
    restart: unless-stopped
    networks:
      - meganetwork
  
  tgbot:
    build:
      context: .
      dockerfile: ./services/tgbot/Dockerfile
    container_name: tgbot
    ports:
      - "8890:8890"
    env_file:
      - ./services/tgbot/.env
    volumes:
      - ./services/tgbot/logs:/app/logs
    restart: unless-stopped
    networks:
      - meganetwork

networks:
  meganetwork:
    driver: bridge
