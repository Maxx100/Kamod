{% extends 'base.html' %}

{% block content %}
<h1 class="page-title">Личный кабинет</h1>
<div class="card" style="max-width:700px; margin: 0 auto 24px;">
  <form id="profileForm">
    <div class="profile-header">
      <div class="profile-avatar">
        <img id="profileAvatarImage" class="profile-avatar-image hidden" alt="Фото профиля">
        <span id="profileAvatarFallback" class="profile-avatar-fallback">?</span>
      </div>
      <div class="profile-header-body">
        <h2 id="profileDisplayName" class="profile-display-name">Профиль</h2>
        <div class="profile-photo-controls">
          <label for="profilePhoto" class="btn btn-outline">Загрузить фото</label>
          <span id="profilePhotoName" class="profile-photo-name">Файл не выбран</span>
        </div>
        <div style="margin-top:12px;">
          <a href="/my-events" class="btn btn-primary">Мои мероприятия</a>
        </div>
        <input id="profilePhoto" type="file" accept="image/*" class="hidden">
      </div>
    </div>
    <div class="form-group"><label for="fullName">ФИО *</label><input id="fullName" required></div>
    <div class="form-group"><label for="email">Email</label><input id="email" disabled></div>
    <div class="form-group"><label for="university">ВУЗ</label><input id="university"></div>
    <div class="form-group"><label for="faculty">Факультет</label><input id="faculty"></div>
    <div class="form-group"><label for="telegram">Telegram</label><input id="telegram" placeholder="@username"></div>
    <div id="profileError" class="error hidden"></div>
    <div id="profileSuccess" class="success hidden"></div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Сохранить</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
let selectedProfilePhoto = null;
let activeProfileAvatarUrl = null;

function getProfileInitials(fullName) {
  if (!fullName) return '?';
  return fullName
    .split(' ')
    .map((part) => part[0]?.toUpperCase())
    .filter(Boolean)
    .slice(0, 2)
    .join('');
}

function setProfileAvatar(name, photoUrl = null) {
  const imageEl = document.getElementById('profileAvatarImage');
  const fallbackEl = document.getElementById('profileAvatarFallback');
  fallbackEl.textContent = getProfileInitials(name);

  if (photoUrl) {
    imageEl.src = photoUrl;
    imageEl.classList.remove('hidden');
    fallbackEl.classList.add('hidden');
    return;
  }

  imageEl.removeAttribute('src');
  imageEl.classList.add('hidden');
  fallbackEl.classList.remove('hidden');
}

function setActiveProfileAvatarUrl(url) {
  if (activeProfileAvatarUrl) {
    URL.revokeObjectURL(activeProfileAvatarUrl);
    activeProfileAvatarUrl = null;
  }
  activeProfileAvatarUrl = url;
}

async function syncProfileAvatar(user, token) {
  if (!user?.hasPhoto) {
    setActiveProfileAvatarUrl(null);
    setProfileAvatar(user?.fullName || '', null);
    return;
  }

  try {
    const response = await fetch('/api/users/me/photo', {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (!response.ok) {
      setActiveProfileAvatarUrl(null);
      setProfileAvatar(user.fullName, null);
      return;
    }

    const objectUrl = URL.createObjectURL(await response.blob());
    setActiveProfileAvatarUrl(objectUrl);
    setProfileAvatar(user.fullName, objectUrl);
  } catch {
    setActiveProfileAvatarUrl(null);
    setProfileAvatar(user.fullName, null);
  }
}

async function loadProfile() {
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = '/login'; return; }

  const response = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
  if (!response.ok) {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login';
    return;
  }

  const user = await response.json();
  localStorage.setItem('user', JSON.stringify(user));
  document.getElementById('profileDisplayName').textContent = user.fullName || 'Профиль';
  document.getElementById('fullName').value = user.fullName || '';
  document.getElementById('email').value = user.email || '';
  document.getElementById('university').value = user.university || '';
  document.getElementById('faculty').value = user.faculty || '';
  document.getElementById('telegram').value = user.telegram || '';
  await syncProfileAvatar(user, token);
}

document.addEventListener('DOMContentLoaded', loadProfile);

document.getElementById('profilePhoto').addEventListener('change', async (e) => {
  const [file] = e.target.files || [];
  selectedProfilePhoto = file || null;
  const nameEl = document.getElementById('profilePhotoName');
  const currentName = document.getElementById('fullName').value || document.getElementById('profileDisplayName').textContent || '';

  if (!selectedProfilePhoto) {
    nameEl.textContent = 'Файл не выбран';
    const storedUser = JSON.parse(localStorage.getItem('user') || 'null');
    const token = localStorage.getItem('token');
    if (storedUser && token) {
      await syncProfileAvatar(storedUser, token);
    } else {
      setProfileAvatar(currentName, null);
    }
    return;
  }

  nameEl.textContent = selectedProfilePhoto.name;
  const previewUrl = URL.createObjectURL(selectedProfilePhoto);
  setActiveProfileAvatarUrl(previewUrl);
  setProfileAvatar(currentName, previewUrl);
});

document.getElementById('profileForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = '/login'; return; }

  const errorEl = document.getElementById('profileError');
  const successEl = document.getElementById('profileSuccess');
  errorEl.classList.add('hidden');
  successEl.classList.add('hidden');

  const payload = {
    fullName: document.getElementById('fullName').value,
    university: document.getElementById('university').value,
    faculty: document.getElementById('faculty').value,
    telegram: document.getElementById('telegram').value,
  };

  const response = await fetch('/api/users/me', {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await response.json();

  if (!response.ok) {
    errorEl.textContent = data.message || 'Ошибка сохранения';
    errorEl.classList.remove('hidden');
    return;
  }

  let updatedUser = data;
  localStorage.setItem('user', JSON.stringify(updatedUser));

  if (selectedProfilePhoto) {
    const photoFormData = new FormData();
    photoFormData.append('photo', selectedProfilePhoto);

    const photoResponse = await fetch('/api/users/me/photo', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: photoFormData
    });
    const photoData = await photoResponse.json();

    if (!photoResponse.ok) {
      errorEl.textContent = photoData.message || 'Фото профиля сохранить не удалось';
      errorEl.classList.remove('hidden');
      document.getElementById('profileDisplayName').textContent = updatedUser.fullName || 'Профиль';
      await syncProfileAvatar(updatedUser, token);
      await updateAuthUI();
      return;
    }

    updatedUser = { ...updatedUser, hasPhoto: Boolean(photoData.hasPhoto), photoUrl: photoData.hasPhoto ? '/api/users/me/photo' : null };
    localStorage.setItem('user', JSON.stringify(updatedUser));
    selectedProfilePhoto = null;
    document.getElementById('profilePhoto').value = '';
    document.getElementById('profilePhotoName').textContent = 'Фото профиля сохранено';
  }

  document.getElementById('profileDisplayName').textContent = updatedUser.fullName || 'Профиль';
  await syncProfileAvatar(updatedUser, token);
  await updateAuthUI();
  successEl.textContent = 'Профиль обновлён';
  successEl.classList.remove('hidden');
});
</script>
{% endblock %}
