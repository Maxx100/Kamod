<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои билеты — СТУДEVENTS</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    @font-face {
      font-family: 'GolosText';
      font-weight: 1 999;
      src: url('https://cdn.itmo.pro/fonts/Golos-Text_VF.ttf') format('truetype');
    }
    @font-face {
      font-family: 'ALS Gorizont Variable';
      font-weight: 1 999;
      src: url('https://cdn.itmo.pro/fonts/ALS%20Gorizont%20Variable.ttf') format('truetype');
    }

    :root {
      --white-color: #fff;
      --black-color: #000;
      --link-color: #254ddd;
      --secondary-color: #333;
      --primary-color: #0b68fe;
      --orange-color: #ee8423;
      --red-color: #d2342d;
      --green-color: #03ad3f;
      --grey-color: #8e92a2;
      --light-grey-color: #f5f6fa;
      --black-300: #a3a6af;
      --black-600: #37394b;
      --pink-tag-color: #ef85b4;
      --orange-tag-color: #f07f55;
      --red-tag-color: #e83757;
      --green-tag-color: #00a255;
      --blue-tag-color: #008dcf;
      --lilac-tag-color: #8373b3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      font-size: 16px;
      font-family: 'GolosText', sans-serif;
      background: var(--white-color);
      color: var(--black-color);
      min-height: 100vh;
    }
    h1, h2, h3, h4 {
      font-family: 'ALS Gorizont Variable', sans-serif;
      font-weight: 700;
    }
    h1 { font-size: 32px; line-height: 48px; font-weight: 750; }
    h2 { font-size: 28px; line-height: 52px; font-weight: 750; }
    p { font-size: 16px; line-height: 24px; }
    a { color: var(--link-color); text-decoration: none; }

    /* Header */
    .header {
      display: flex;
      width: 100%;
      max-width: 1192px;
      height: 72px;
      align-items: center;
      justify-content: space-between;
      margin: 0 auto;
      padding: 0 16px;
      position: sticky;
      top: 0;
      background: var(--white-color);
      z-index: 100;
      border-bottom: 1px solid var(--light-grey-color);
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--black-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      color: var(--black-600);
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--primary-color);
    }
    .auth-buttons {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* Container */
    .container {
      max-width: 1208px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Page Header */
    .page-header {
      padding: 40px 16px 32px;
      border-bottom: 1px solid var(--light-grey-color);
      margin-bottom: 32px;
    }
    .page-title {
      font-size: 32px;
      font-weight: 750;
      line-height: 48px;
      margin-bottom: 8px;
    }
    .page-subtitle {
      color: var(--black-300);
      font-size: 16px;
      line-height: 24px;
    }

    /* Tickets Grid */
    .tickets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 32px;
      margin-bottom: 48px;
    }
    @media (max-width: 768px) {
      .tickets-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    /* Ticket Card */
    .ticket-card {
      background: var(--white-color);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: all 0.3s linear;
    }
    .ticket-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transform: translateY(-2px);
    }

    .ticket-image-wrapper {
      position: relative;
      height: 200px;
      overflow: clip;
      background: linear-gradient(180deg, rgba(140,140,140,0) 71%, rgba(0,0,0,0.7));
      border-radius: 24px 24px 0 0;
    }
    .ticket-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transition: scale 0.3s;
      z-index: -1;
    }
    .ticket-card:hover .ticket-image {
      scale: 1.1;
    }

    .ticket-tags {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .ticket-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      height: 24px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      letter-spacing: 0.4px;
      color: var(--white-color);
      text-align: center;
    }
    .pink-tag { background: var(--pink-tag-color); }
    .lilac-tag { background: var(--lilac-tag-color); }
    .blue-tag { background: var(--blue-tag-color); }
    .orange-tag { background: var(--orange-tag-color); }
    .green-tag { background: var(--green-tag-color); }
    .red-tag { background: var(--red-tag-color); }

    .ticket-content {
      padding: 20px;
    }
    .ticket-name {
      color: var(--black-color);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 24px;
    }
    .ticket-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .ticket-info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--black-300);
      font-size: 14px;
      line-height: 20px;
    }
    .ticket-info-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Ticket QR Section */
    .ticket-qr-section {
      background: var(--light-grey-color);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }
    .ticket-qr-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .ticket-qr-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--black-600);
    }
    .ticket-status {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-active {
      background: rgba(3, 173, 63, 0.1);
      color: var(--green-color);
    }
    .status-used {
      background: rgba(163, 166, 175, 0.1);
      color: var(--black-300);
    }
    .status-expired {
      background: rgba(210, 52, 45, 0.1);
      color: var(--red-color);
    }

    .ticket-qr-code {
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--white-color);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .ticket-qr-code img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .ticket-number {
      text-align: center;
      font-size: 14px;
      color: var(--black-600);
      font-family: monospace;
      letter-spacing: 2px;
    }

    /* Ticket Actions */
    .ticket-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'GolosText', sans-serif;
      flex: 1;
    }
    .btn-primary {
      background: var(--black-color);
      color: var(--white-color);
    }
    .btn-primary:hover {
      background: var(--primary-color);
    }
    .btn-outline {
      background: transparent;
      color: var(--black-color);
      border: 2px solid var(--black-color);
    }
    .btn-outline:hover {
      background: var(--black-color);
      color: var(--white-color);
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 16px;
      text-align: center;
    }
    .empty-state-icon {
      width: 120px;
      height: 120px;
      background: var(--light-grey-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .empty-state-icon svg {
      width: 60px;
      height: 60px;
      color: var(--black-300);
    }
    .empty-state-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--black-600);
    }
    .empty-state-text {
      color: var(--black-300);
      font-size: 16px;
      line-height: 24px;
      margin-bottom: 24px;
      max-width: 400px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      overflow-x: auto;
      padding: 0 16px;
    }
    .tabs::-webkit-scrollbar {
      display: none;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      background: var(--light-grey-color);
      color: var(--black-600);
      border: none;
    }
    .tab:hover {
      background: rgba(11, 104, 254, 0.1);
      color: var(--primary-color);
    }
    .tab.active {
      background: var(--black-color);
      color: var(--white-color);
    }

    /* Footer */
    .footer {
      background: var(--light-grey-color);
      padding: 24px 0;
      margin-top: 64px;
      border-top: 1px solid var(--black-300);
    }
    .footer-content {
      max-width: 1208px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--black-color);
    }
    .footer-links {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .footer-links span {
      text-transform: uppercase;
      font-weight: 500;
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        height: auto;
        padding: 16px;
        gap: 16px;
      }
      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }
      .page-title {
        font-size: 26px;
        line-height: 34px;
      }
      .footer-content {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }
    }

    /* Utilities */
    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .mt-2 { margin-top: 32px; }
    .mb-2 { margin-bottom: 32px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="index.html" class="logo">
      <span>🎓</span> СТУДEVENTS
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Мероприятия</a></li>
      <li><a href="my-tickets.html" class="active">Мои билеты</a></li>
      <li><a href="#about">О платформе</a></li>
    </ul>
    <div class="auth-buttons" id="authButtons">
      <!-- Заполняется JS -->
    </div>
  </header>

  <!-- Page Header -->
  <section class="page-header container">
    <h1 class="page-title">Мои билеты</h1>
    <p class="page-subtitle">Мероприятия, на которые вы зарегистрированы</p>
  </section>

  <!-- Main Content -->
  <main class="container">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-filter="all">Все</button>
      <button class="tab" data-filter="upcoming">Предстоящие</button>
      <button class="tab" data-filter="past">Прошедшие</button>
    </div>

    <!-- Tickets Grid -->
    <div class="tickets-grid" id="ticketsGrid">
      <!-- Заполняется JS -->
    </div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="emptyState">
      <div class="empty-state-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
        </svg>
      </div>
      <h2 class="empty-state-title">У вас пока нет билетов</h2>
      <p class="empty-state-text">
        Зарегистрируйтесь на мероприятия, чтобы получить билеты и участвовать в событиях
      </p>
      <a href="index.html" class="btn btn-primary">
        Смотреть мероприятия
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">🎓 СТУДEVENTS</div>
      <div class="footer-links">
        <span>Будьте с нами</span>
        <a href="#" target="_blank">VK</a>
        <a href="#" target="_blank">TG</a>
      </div>
    </div>
  </footer>

  <script>
    // Проверка авторизации
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user'));
      
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      
      updateAuthUI(user);
      loadTickets('all');
    });

    function updateAuthUI(user) {
      const authButtons = document.getElementById('authButtons');
      if (user) {
        authButtons.innerHTML = `
          <span style="font-weight: 500; color: var(--black-600);">👋 ${user.fullName?.split(' ')[0] || 'Пользователь'}</span>
          <button class="btn btn-outline" onclick="logout()" style="padding: 8px 16px;">Выйти</button>
        `;
      } else {
        authButtons.innerHTML = `
          <a href="login.html" class="btn btn-outline" style="padding: 8px 16px;">Войти</a>
          <a href="register.html" class="btn btn-primary" style="padding: 8px 16px;">Регистрация</a>
        `;
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }

    // Загрузка билетов
    async function loadTickets(filter = 'all') {
      const grid = document.getElementById('ticketsGrid');
      const emptyState = document.getElementById('emptyState');
      const user = JSON.parse(localStorage.getItem('user'));
      
      if (!user) return;
      
      try {
        const token = localStorage.getItem('token');
        const response = await fetch('/api/users/' + user.id + '/registrations', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) throw new Error('Ошибка загрузки');
        
        let registrations = await response.json();
        
        // Фильтрация по статусу
        const now = new Date();
        if (filter === 'upcoming') {
          registrations = registrations.filter(r => new Date(r.event.eventDate) > now);
        } else if (filter === 'past') {
          registrations = registrations.filter(r => new Date(r.event.eventDate) <= now);
        }
        
        if (registrations.length === 0) {
          grid.innerHTML = '';
          emptyState.classList.remove('hidden');
          return;
        }
        
        emptyState.classList.add('hidden');
        
        grid.innerHTML = registrations.map(reg => {
          const event = reg.event;
          const eventDate = new Date(event.eventDate);
          const isPast = eventDate <= now;
          const statusClass = isPast ? 'status-used' : 'status-active';
          const statusText = isPast ? 'Прошло' : 'Активен';
          
          const categoryTags = {
            hackathon: { label: 'Хакатон', class: 'pink-tag' },
            conference: { label: 'Конференция', class: 'lilac-tag' },
            workshop: { label: 'Мастер-класс', class: 'blue-tag' },
            meetup: { label: 'Митап', class: 'pink-tag' },
            competition: { label: 'Конкурс', class: 'lilac-tag' },
            other: { label: 'Другое', class: 'orange-tag' }
          };
          const tag = categoryTags[event.category] || categoryTags.other;
          
          return `
            <div class="ticket-card">
              <div class="ticket-image-wrapper">
                <img src="${event.coverUrl || 'https://via.placeholder.com/400x200'}" 
                     alt="${event.title}" 
                     class="ticket-image">
                <div class="ticket-tags">
                  <span class="ticket-tag ${tag.class}">${tag.label}</span>
                </div>
              </div>
              
              <div class="ticket-content">
                <h3 class="ticket-name">${event.title}</h3>
                
                <div class="ticket-info">
                  <div class="ticket-info-item">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span>${formatDate(event.eventDate)}</span>
                  </div>
                  <div class="ticket-info-item">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span>${truncate(event.address, 35)}</span>
                  </div>
                </div>
                
                <div class="ticket-qr-section">
                  <div class="ticket-qr-header">
                    <span class="ticket-qr-title">Билет #${reg.id.toString().padStart(6, '0')}</span>
                    <span class="ticket-status ${statusClass}">${statusText}</span>
                  </div>
                  
                  <div class="ticket-qr-code">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(JSON.stringify({
                      eventId: event.id,
                      registrationId: reg.id,
                      userId: user.id
                    }))}" 
                         alt="QR Code">
                  </div>
                  
                  <div class="ticket-number">
                    ${reg.id.toString().padStart(12, '0')}
                  </div>
                </div>
                
                <div class="ticket-actions">
                  <a href="event.html?id=${event.id}" class="btn btn-primary">
                    Подробнее
                  </a>
                  ${!isPast ? `
                    <button class="btn btn-outline" onclick="cancelRegistration(${reg.id}, ${event.id})">
                      Отмена
                    </button>
                  ` : ''}
                </div>
              </div>
            </div>
          `;
        }).join('');
        
      } catch (err) {
        console.error('Ошибка загрузки билетов:', err);
        grid.innerHTML = '<p style="color: var(--red-color); text-align: center;">Ошибка загрузки данных</p>';
      }
    }

    // Отмена регистрации
    async function cancelRegistration(registrationId, eventId) {
      if (!confirm('Вы уверены, что хотите отменить регистрацию?')) return;
      
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/events/${eventId}/registration/${registrationId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          showToast('✅ Регистрация отменена', 'success');
          loadTickets('all');
        } else {
          const error = await response.json();
          showToast(error.message || 'Ошибка отмены', 'error');
        }
      } catch (err) {
        showToast('Ошибка соединения', 'error');
      }
    }

    // Вспомогательные функции
    function formatDate(dateString) {
      return new Date(dateString).toLocaleString('ru-RU', {
        day: '2-digit',
        month: 'long',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function truncate(str, len) {
      return str.length > len ? str.slice(0, len) + '…' : str;
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 20px;
        border-radius: 12px;
        background: ${type === 'success' ? 'var(--green-color)' : type === 'error' ? 'var(--red-color)' : 'var(--primary-color)'};
        color: white;
        font-weight: 500;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Анимации
    const style = document.createElement('style');
    style.textContent = `
      @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100%); opacity: 0; }
      }
    `;
    document.head.appendChild(style);

    // Переключение табов
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadTickets(tab.dataset.filter);
      });
    });
  </script>
</body>
</html>
