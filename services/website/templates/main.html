{% extends 'base.html' %}

{% block content %}
<section id="heroEvent">
  <div class="carousel-item">
    <img src="/img/1.jpeg" alt="Событие" class="carousel-bg">
    <div class="carousel-content">
      <h1 class="carousel-title">Загрузка событий...</h1>
    </div>
  </div>
</section>

<h2 class="page-title" style="margin-top:24px;">Популярные сейчас</h2>
<div class="events-grid" id="popularEventsGrid"></div>

<h2 class="page-title">Все мероприятия</h2>
<div class="filters">
  <input id="dateFilter" type="date">
  <select id="categoryFilter">
    <option value="">Все категории</option>
    <option value="hackathon">Хакатон</option>
    <option value="conference">Конференция</option>
    <option value="workshop">Мастер-класс</option>
    <option value="meetup">Митап</option>
    <option value="competition">Конкурс</option>
    <option value="other">Другое</option>
  </select>
  <button class="btn btn-outline" onclick="resetFilters()">Сбросить</button>
</div>

<div class="events-grid" id="eventsGrid"></div>
<div style="margin: 20px 0 32px; text-align: center;">
  <button class="btn btn-primary" id="loadMoreBtn">Показать ещё</button>
</div>
{% endblock %}

{% block scripts %}
<script src="/js/events.js"></script>
{% endblock %}
