{% extends 'base.html' %}

{% block content %}
<section style="display:flex;justify-content:center;padding:30px 0;">
  <div class="card" style="max-width:620px;width:100%;">
    <h1 class="page-title" style="margin-top:0;text-align:center;">Регистрация</h1>
    <form id="registerForm">
      <div class="form-group"><label for="fullName">ФИО *</label><input id="fullName" required></div>
      <div class="form-group"><label for="email">Email *</label><input id="email" type="email" required></div>
      <div class="form-group"><label for="password">Пароль *</label><input id="password" type="password" minlength="8" required></div>
      <div class="form-group"><label for="university">ВУЗ</label><input id="university"></div>
      <div class="form-group"><label for="faculty">Факультет</label><input id="faculty"></div>
      <div class="form-group"><label for="course">Курс</label><input id="course"></div>
      <div class="form-group"><label for="telegram">Telegram</label><input id="telegram" placeholder="@username"></div>
      <div id="registerError" class="error hidden"></div>
      <div id="registerSuccess" class="success hidden"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Зарегистрироваться</button>
    </form>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('registerError');
  const successEl = document.getElementById('registerSuccess');
  errorEl.classList.add('hidden');
  successEl.classList.add('hidden');

  const payload = {
    fullName: document.getElementById('fullName').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    university: document.getElementById('university').value,
    faculty: document.getElementById('faculty').value,
    course: document.getElementById('course').value,
    telegram: document.getElementById('telegram').value,
  };

  try {
    const response = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    if (!response.ok) {
      errorEl.textContent = result.message || 'Ошибка регистрации';
      errorEl.classList.remove('hidden');
      return;
    }
    successEl.textContent = 'Успешно. Выполняю вход...';
    successEl.classList.remove('hidden');

    const loginResponse = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login: payload.email, password: payload.password })
    });
    const loginData = await loginResponse.json();
    if (loginResponse.ok) {
      localStorage.setItem('token', loginData.token);
      localStorage.setItem('user', JSON.stringify(loginData.user));
      window.location.href = '/main';
    }
  } catch {
    errorEl.textContent = 'Ошибка соединения';
    errorEl.classList.remove('hidden');
  }
});
</script>
{% endblock %}
