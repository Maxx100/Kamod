{% extends 'base.html' %}

{% block content %}
<section style="display:flex;justify-content:center;padding:30px 0;">
  <div class="card" style="max-width:520px;width:100%;">
    <h1 class="page-title" style="margin-top:0;text-align:center;">Вход</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="login">Логин или Email</label>
        <input type="text" id="login" required>
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" required>
      </div>
      <div id="loginError" class="error hidden"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
    </form>
    <p style="margin-top:16px;color:var(--black-600);">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const login = document.getElementById('login').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  errorEl.classList.add('hidden');

  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password })
    });
    const payload = await response.json();
    if (!response.ok) {
      errorEl.textContent = payload.message || 'Ошибка входа';
      errorEl.classList.remove('hidden');
      return;
    }
    localStorage.setItem('token', payload.token);
    localStorage.setItem('user', JSON.stringify(payload.user));
    window.location.href = '/main';
  } catch {
    errorEl.textContent = 'Ошибка соединения';
    errorEl.classList.remove('hidden');
  }
});
</script>
{% endblock %}
