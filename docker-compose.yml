services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - meganetwork

  website:
    build:
      context: .
      dockerfile: ./services/website/Dockerfile
    container_name: website
    ports:
      - "127.0.0.1:${WEBSITE_PORT:-3001}:${WEBSITE_PORT:-3001}"
    env_file:
      - ./services/website/.env
    environment:
      DATABASE_API_URL: http://database:5000
      TGBOT_API_URL: http://tgbot:8890
      WEBSITE_PORT: ${WEBSITE_PORT:-3001}
      WEBSITE_JWT_SECRET: ${WEBSITE_JWT_SECRET:-change-me}
      WEBSITE_JWT_ALGORITHM: HS256
      WEBSITE_JWT_EXPIRE_SECONDS: 2592000
    volumes:
      - ./services/website/logs:/app/logs
    restart: unless-stopped
    networks:
      - meganetwork

  database:
    build:
      context: .
      dockerfile: ./services/database/Dockerfile
    container_name: database
    depends_on:
      - postgres
    ports:
      - "5002:5000"
    environment:
      SERVICE_NAME: event-service
      PORT: 5000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    env_file:
      - ./services/database/.env
    volumes:
      - ./services/database/logs:/app/logs
      - ./data:/data
    restart: unless-stopped
    networks:
      - meganetwork
  
  tgbot:
    build:
      context: .
      dockerfile: ./services/tgbot/Dockerfile
    container_name: tgbot
    ports:
      - "127.0.0.1:8890:8890"
      - "5003:8890"
    env_file:
      - ./services/tgbot/.env
    environment:
      TG_DB_BASE_URL: http://database:5000
    volumes:
      - ./services/tgbot/logs:/app/logs
    restart: unless-stopped
    networks:
      - meganetwork

networks:
  meganetwork:
    driver: bridge
